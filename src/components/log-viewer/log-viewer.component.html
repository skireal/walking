<!-- Кнопка-триггер: маленький чип в левом нижнем углу -->
<button
  (click)="toggle()"
  class="fixed bottom-20 left-3 z-[9999] bg-gray-800 border border-gray-600 text-gray-300 text-xs px-2 py-1 rounded-full shadow"
>
  📋 {{ logService.logs().length }}
</button>

<!-- Полноэкранная панель с логами -->
@if (visible) {
  <div class="fixed inset-0 z-[10000] bg-gray-950 flex flex-col">

    <!-- Шапка -->
    <div class="flex items-center justify-between px-3 py-2 bg-gray-900 border-b border-gray-700 shrink-0">
      <span class="text-white font-semibold text-sm">Logs ({{ logService.logs().length }})</span>
      <div class="flex gap-2">
        <button (click)="copy()" class="bg-teal-700 text-white text-xs px-3 py-1 rounded">
          Copy all
        </button>
        <button (click)="clear()" class="bg-gray-700 text-white text-xs px-3 py-1 rounded">
          Clear
        </button>
        <button (click)="toggle()" class="bg-gray-700 text-white text-xs px-3 py-1 rounded">
          ✕
        </button>
      </div>
    </div>

    <!-- Список логов -->
    <div id="log-scroll" class="flex-1 overflow-y-auto p-2 font-mono text-xs">
      @for (entry of logService.logs(); track $index) {
        <div class="mb-0.5 leading-snug">
          <span class="text-gray-500">{{ entry.time }}</span>
          <span [class]="levelClass(entry.level)"> [{{ entry.level.toUpperCase() }}] </span>
          <span class="text-gray-200 break-all">{{ entry.message }}</span>
        </div>
      }
      @if (logService.logs().length === 0) {
        <p class="text-gray-500 text-center mt-10">Логов пока нет</p>
      }
    </div>

  </div>
}
