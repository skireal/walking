<div class="relative h-screen w-screen">
  <!-- Map Container -->
  <div id="map" class="h-full w-full z-0"></div>

  <!-- UI Overlay -->
  <div class="absolute top-0 left-0 right-0 z-10 p-3 pointer-events-none">
    <div class="max-w-md mx-auto bg-gray-900/70 backdrop-blur-sm px-4 py-2 rounded-full shadow-lg pointer-events-auto flex items-center justify-between">
      <div class="flex items-center gap-2">
        @switch (locationStatus()) {
          @case ('tracking') {
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
            <span class="text-xs text-gray-300">Live</span>
          }
          @case ('denied') {
            <div class="w-2 h-2 bg-red-500 rounded-full"></div>
            <span class="text-xs text-gray-300">Denied</span>
          }
          @case ('error') {
            <div class="w-2 h-2 bg-yellow-500 rounded-full"></div>
            <span class="text-xs text-gray-300">Error</span>
          }
          @case ('low-accuracy') {
            <div class="w-2 h-2 bg-yellow-500 rounded-full animate-pulse"></div>
            <span class="text-xs text-gray-300">Searching GPS</span>
          }
          @default {
            <div class="w-2 h-2 bg-gray-500 rounded-full animate-pulse"></div>
            <span class="text-xs text-gray-400">Starting...</span>
          }
        }
      </div>
      <div class="flex items-center gap-3">
        <span class="text-sm font-semibold text-white">{{ sessionDistance() }} <span class="text-gray-400 font-normal text-xs">today</span></span>
        <div class="w-px h-4 bg-gray-600"></div>
        <span class="text-sm font-semibold text-white">{{ discoveredTiles() }} <span class="text-gray-400 font-normal text-xs">tiles</span></span>
      </div>
    </div>
  </div>

  <!-- Action Buttons -->
  <div class="absolute bottom-24 right-4 z-10 flex flex-col items-center space-y-3 pointer-events-auto">
    <!-- Recenter Button -->
    <button
      (click)="recenterMap()"
      aria-label="Recenter map on current location"
      class="bg-gray-800/80 backdrop-blur-sm text-white p-3 rounded-full shadow-lg active:scale-95 transition-transform"
    >
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.375a6.375 6.375 0 1 1 0-12.75 6.375 6.375 0 0 1 0 12.75Z" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 12.75h.007v.008H12v-.008Z" />
      </svg>
    </button>
  </div>
</div>
