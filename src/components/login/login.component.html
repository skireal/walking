<div class="flex items-center justify-center min-h-screen bg-gray-900 px-4">
  <div class="w-full max-w-md space-y-8">
    <div class="flex flex-col items-center gap-3">
      <svg class="w-16 h-16" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M 44,59 68,83 44,107 20,83 Z"    fill="#2dd4bf"/>
        <path d="M 96,59 120,83 96,107 72,83 Z"    fill="#2dd4bf"/>
        <path d="M 148,59 172,83 148,107 124,83 Z" fill="#2dd4bf"/>
        <path d="M 70,85 94,109 70,133 46,109 Z"   fill="#2dd4bf"/>
        <path d="M 122,85 146,109 122,133 98,109 Z" fill="#2dd4bf"/>
      </svg>
      <span class="text-xs tracking-[.25em] uppercase text-gray-500">walker</span>
      <h2 class="mt-2 text-center text-2xl font-bold text-white">Welcome back</h2>
      <p class="text-center text-sm text-gray-400">Sign in to continue your journey.</p>
    </div>
    <form class="mt-8 space-y-6" (ngSubmit)="login()">
      <div class="rounded-md shadow-sm -space-y-px">
        <div>
          <label for="email-address" class="sr-only">Email address</label>
          <input
            id="email-address"
            name="email"
            type="email"
            autocomplete="email"
            required
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            class="appearance-none rounded-none relative block w-full px-3 py-3 border border-gray-700 bg-gray-800 text-white placeholder-gray-500 rounded-t-md focus:outline-none focus:ring-teal-500 focus:border-teal-500 focus:z-10 sm:text-sm"
            placeholder="Email address">
        </div>
        <div>
          <label for="password" class="sr-only">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            class="appearance-none rounded-none relative block w-full px-3 py-3 border border-gray-700 bg-gray-800 text-white placeholder-gray-500 rounded-b-md focus:outline-none focus:ring-teal-500 focus:border-teal-500 focus:z-10 sm:text-sm"
            placeholder="Password">
        </div>
      </div>

      @if (error()) {
        <div class="bg-red-900/50 text-red-300 text-sm p-3 rounded-lg text-center">
            {{ error() }}
        </div>
      }

      <div>
        <button
          type="submit"
          [disabled]="isLoading()"
          [attr.aria-busy]="isLoading()"
          class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-teal-600 hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 focus:ring-offset-gray-900 disabled:opacity-50 disabled:cursor-wait">
          @if (isLoading()) {
            <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>
          } @else {
            <span>Sign in</span>
          }
        </button>
      </div>
    </form>
    <div class="relative flex items-center py-2">
      <div class="flex-grow border-t border-gray-700"></div>
      <span class="mx-3 text-xs text-gray-500 uppercase tracking-wider">or</span>
      <div class="flex-grow border-t border-gray-700"></div>
    </div>

    <button
      type="button"
      (click)="loginWithGoogle()"
      [disabled]="isLoading()"
      class="w-full flex items-center justify-center gap-3 py-3 px-4 border border-gray-600 rounded-md bg-gray-800 text-white text-sm font-medium hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 focus:ring-offset-gray-900 disabled:opacity-50 disabled:cursor-wait transition-colors">
      <svg class="h-5 w-5" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <p class="mt-2 text-center text-sm text-gray-400">
      Don't have an account?
      <a routerLink="/register" class="font-medium text-teal-400 hover:text-teal-300">
        Sign up
      </a>
    </p>
  </div>
</div>
