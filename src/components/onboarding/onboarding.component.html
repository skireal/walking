<div class="onboarding">
  <div class="onboarding__card">

    <!-- Logo illustration — opacity of each diamond varies per slide -->
    <div class="onboarding__icon">
      <svg viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- slide 0: mostly hidden (2/5 visible) -->
        <!-- slide 1: half revealed (3/5 visible) -->
        <!-- slide 2: fully revealed (5/5 visible) -->
        <path d="M 44,59 68,83 44,107 20,83 Z"    fill="#2dd4bf"
          [attr.opacity]="step() === 0 ? 0.9 : step() === 1 ? 0.9 : 0.9"/>
        <path d="M 96,59 120,83 96,107 72,83 Z"    fill="#2dd4bf"
          [attr.opacity]="step() === 0 ? 0.15 : step() === 1 ? 0.9 : 0.9"/>
        <path d="M 148,59 172,83 148,107 124,83 Z" fill="#2dd4bf"
          [attr.opacity]="step() === 0 ? 0.15 : step() === 1 ? 0.15 : 0.9"/>
        <path d="M 70,85 94,109 70,133 46,109 Z"   fill="#2dd4bf"
          [attr.opacity]="step() === 0 ? 0.9 : step() === 1 ? 0.9 : 0.9"/>
        <path d="M 122,85 146,109 122,133 98,109 Z" fill="#2dd4bf"
          [attr.opacity]="step() === 0 ? 0.15 : step() === 1 ? 0.5 : 0.9"/>
      </svg>
    </div>

    <!-- Text -->
    <h2 class="onboarding__title">{{ steps[step()].title }}</h2>
    <p class="onboarding__body">{{ steps[step()].body }}</p>

    <!-- Dots -->
    <div class="onboarding__dots">
      @for (s of steps; track $index) {
        <div class="onboarding__dot" [class.onboarding__dot--active]="$index === step()"></div>
      }
    </div>

    <!-- Button -->
    <button class="onboarding__btn" (click)="next()">
      @if (step() < steps.length - 1) {
        Continue
      } @else {
        Start exploring
      }
    </button>

    <!-- Skip -->
    @if (step() < steps.length - 1) {
      <button class="onboarding__skip" (click)="finish()">Skip</button>
    }

  </div>
</div>
