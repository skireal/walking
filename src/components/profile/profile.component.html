<div class="p-6 space-y-8 animate-fade-in">
  <!-- Profile Header -->
  <div class="flex items-center space-x-4">
    <img [src]="avatarUrl()" alt="User Avatar" class="w-20 h-20 rounded-full" />
    <div>
      <h1 class="text-2xl font-bold text-white">{{ displayName() }}</h1>
      @if (currentUser(); as user) {
        <p class="text-gray-500 text-sm">{{ user.email }}</p>
      }
      <p class="text-gray-400">{{ joinDate() }}</p>
    </div>
  </div>

  <!-- All-Time Stats -->
  <div>
    <h2 class="text-xl font-semibold text-white mb-3">All-Time Stats</h2>
    <div class="grid grid-cols-1 gap-4">
      @for (stat of stats(); track stat.label) {
        <div class="bg-gray-800 p-4 rounded-xl text-center shadow-lg">
          <p class="text-2xl font-bold text-teal-400">{{ stat.value }}</p>
          <p class="text-xs text-gray-400 uppercase">{{ stat.label }}</p>
        </div>
      }
    </div>
  </div>

  <!-- Achievements -->
  <div>
    <h2 class="text-xl font-semibold text-white mb-3">Achievements</h2>
    <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-4">
      @for (badge of achievements(); track badge.id) {
        <div
          class="flex flex-col items-center p-2 rounded-lg text-center"
          [class.bg-gray-800]="badge.unlocked"
          [class.bg-gray-800/50]="!badge.unlocked"
          [title]="badge.description"
        >
          <div class="w-12 h-12 rounded-full flex items-center justify-center mb-2" [class.bg-teal-500]="badge.unlocked" [class.bg-gray-700]="!badge.unlocked">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6 text-white"
              [class.opacity-40]="!badge.unlocked"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="1.8"
            >
              @if (badge.icon === 'award') {
                <circle cx="12" cy="12" r="9" />
                <polygon points="12,4 14.5,11 12,13 9.5,11" fill="currentColor" stroke="none" />
                <polygon points="12,20 14.5,13 12,11 9.5,13" fill="currentColor" opacity="0.3" stroke="none" />
                <circle cx="12" cy="12" r="1.5" fill="#2dd4bf" stroke="none" />
              } @else if (badge.icon === 'flame') {
                <rect x="3" y="5" width="18" height="16" rx="2" />
                <line x1="3" y1="10" x2="21" y2="10" />
                <line x1="8" y1="3" x2="8" y2="7" />
                <line x1="16" y1="3" x2="16" y2="7" />
                <text x="12" y="19" text-anchor="middle" font-size="7" font-weight="700" fill="currentColor" stroke="none" font-family="system-ui,sans-serif">
                  7
                </text>
              } @else if (badge.icon === 'mountain') {
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6h-8.5l-1-1H5a2 2 0 00-2 2zm9-13.5V9" />
              } @else if (badge.icon === 'map') {
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 6l6-3 6 3 6-3v13l-6 3-6-3-6 3V6z" />
                <line x1="9" y1="3" x2="9" y2="16" stroke="currentColor" />
                <line x1="15" y1="6" x2="15" y2="19" stroke="currentColor" />
              } @else if (badge.icon === 'globe') {
                <circle cx="12" cy="12" r="9" />
                <ellipse cx="12" cy="12" rx="4.5" ry="9" />
                <line x1="3.5" y1="8.5" x2="20.5" y2="8.5" />
                <line x1="3.5" y1="15.5" x2="20.5" y2="15.5" />
              }
            </svg>
          </div>
          <p class="text-xs font-medium" [class.text-white]="badge.unlocked" [class.text-gray-400]="!badge.unlocked">{{ badge.name }}</p>
        </div>
      }
    </div>
  </div>

  <!-- Debug: Position Log -->
  <div class="pt-4 border-t border-gray-700/30">
    <p class="text-xs text-gray-600 uppercase tracking-widest mb-3">Debug</p>
    <div class="flex gap-3">
      <button (click)="startLog()" class="flex-1 bg-gray-800 text-gray-400 text-sm font-medium py-2 px-3 rounded-lg">
        Clear log
      </button>
      <button (click)="copyLog()" class="flex-1 bg-gray-800 text-sm font-medium py-2 px-3 rounded-lg transition"
        [class.text-teal-400]="!logCopied()" [class.text-green-400]="logCopied()">
        {{ logCopied() ? '✓ Copied!' : 'Copy log' }}
      </button>
    </div>
  </div>

  <!-- Logout Button -->
  <div class="pt-2">
    <button (click)="logout()" class="w-full bg-gray-700 hover:bg-red-800/50 text-red-400 font-bold py-3 px-4 rounded-lg transition">Log Out</button>
  </div>
</div>
